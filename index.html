<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO básico -->
    <title>Contáctanos | Mi Negocio</title>
    <meta name="description" content="Formulario de contacto para clientes interesados en nuestros servicios. Déjanos tus datos y nos pondremos en contacto.">
    <meta name="robots" content="index, follow">

    <!-- Estilos simples -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }
        header {
            background-color: #007BFF;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        input, textarea, button {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <h1>Contáctanos</h1>
    <p>Déjanos tus datos y nos pondremos en contacto contigo</p>
</header>

<main>
    <!-- Formulario -->
    <form action="https://docs.google.com/forms/d/e/TU_FORM_ID/formResponse" method="POST" target="_blank">
        <input type="text" name="entry.123456" placeholder="Nombre completo" required>
        <input type="email" name="entry.654321" placeholder="Correo electrónico" required>
        <input type="tel" name="entry.111222" placeholder="Teléfono" required>
        <textarea name="entry.333444" placeholder="Mensaje / Servicio de interés" required></textarea>
        <button type="submit">Enviar</button>
    </form>
</main>

</body>
</html>
